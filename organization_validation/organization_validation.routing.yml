organization_validation.submit:
  path: "/organization-validation/manageSelectedOrganisations"
  defaults:
    _controller: '\Drupal\organization_validation\Controller\OrganizationValidationController::manageSelectedOrganisation'
    _title: "Manage Selected Organisation"
  requirements:
    _permission: "access content"
  methods: ["POST"]
