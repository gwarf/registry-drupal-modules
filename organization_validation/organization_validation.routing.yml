organization_validation.check_organisation:
  path: "/check-organisation"
  defaults:
    _controller: '\Drupal\organization_validation\Controller\OrganizationValidationController::checkOrganisation'
    _title: "Organisation Registry"
  requirements:
    _permission: "access content"

organization_validation.confirm_organisation:
  path: "/confirm-organisation/{organisation}/{user}"
  defaults:
    _controller: '\Drupal\organization_validation\Controller\OrganizationValidationController::confirmOrganisation'
    _title: "Confirm Organisation"
  requirements:
    _permission: "access content"

organization_validation.create_organisation:
  path: "/create-organisation/{user}"
  defaults:
    _controller: '\Drupal\organization_validation\Controller\OrganizationValidationController::createOrganisation'
    _title: "Create Organisation"
  requirements:
    _permission: "access content"

