organization_validation.approve_ownership:
  path: "/approve-ownership/{organisation}/{user}"
  defaults:
    _controller: '\Drupal\organization_validation\Controller\OrganizationValidationController::approveOwnership'
    _title: "Approve Ownership Request"
  requirements:
    _permission: "access content"
    #_user_is_logged_in: 'TRUE'  # Only allow logged-in users

organization_validation.confirmation_page:
  path: "/organization-validation/confirmation"
  defaults:
    _controller: '\Drupal\organization_validation\Controller\ConfirmationController::confirmationPage'
    _title: "Confirmation"
  requirements:
    _permission: "access content"

