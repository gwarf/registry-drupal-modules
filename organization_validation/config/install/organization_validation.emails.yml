# 📩 1. Verify Organisation Email (User Confirmation)
verify_org_email:
  subject: "Please confirm your organisational email"
  body: |
    Dear [user:field_full_name],

    Please confirm your organisational email by clicking the link below:

    [confirmation_url]

  from: "EDCH Registry"

# 📩 2. Notify Admins - User Confirmed Org Email
admin_notification:
  subject: "New User pending"
  body: |
    A new user has confirmed their organisational email and is awaiting admin review.

    **User:** [user_name]  
    **Email:** [user_email]

    Click the link below to review the user:

    [review_link]

  from: "EDCH Registry"

# 📩 3. Admin Verified User - Notify User
verify_organisation:
  subject: "Verify your organisation"
  body: |
    Dear [user:field_full_name],

    Your account has been verified by the administrators. Please visit the following link to create or validate your organisation's profile:

    [check_organisation_link]

  from: "EDCH Registry"

# 📩 4. Ownership Request Sent to Organisation Owners
ownership_request:
  subject: "Ownership Request for [organisation_name]"
  body: |
    Dear [owner_name],

    [user_name] has requested ownership of [organisation_name].  

    To approve or reject the request, please visit the following link:

    [approve_ownership_link]

  from: "EDCH Registry"

# 📩 5. Ownership Approved - Notify User
ownership_approved:
  subject: "Your Ownership Request Has Been Approved"
  body: |
    Congratulations! You have been approved as an owner of [organisation_name].  

    You can now manage the organisation profile using the link below:

    [edit_organisation_link]

  from: "EDCH Registry"
