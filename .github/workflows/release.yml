---
name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions: {}

jobs:
  build-and-upload:
    name: Build and upload release archive
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "${TAG}" > /dev/null 2>&1 || \
            gh release create "${TAG}" --draft --generate-notes --title "${TAG}"
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Build modules archive
        run: |
          ARCHIVE_NAME="registry-drupal-modules-${TAG}.tar.gz"
          tar czf "${ARCHIVE_NAME}" \
            computed_address \
            email_protect \
            organization_listing \
            organization_validation \
            org_moderation_sync \
            webform_geonames
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "${GITHUB_ENV}"

      - name: Upload archive to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${TAG}" "${ARCHIVE_NAME}" --clobber
